<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <title>What's next?</title>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/handlebars.js/4.7.3/handlebars.min.js"
      integrity="sha256-/PJBs6QWvXijOFIX04kZpLb6ZtSQckdOIavLWKKOgXU="
      crossorigin="anonymous"
      defer
    ></script>
    <script src="scripts/index.js" type="module"></script>

    <link rel="stylesheet" href="./styles/index.css" />
  </head>
  <body>
    <h1>What's next?</h1>
    <section>
      <h2>Neue Notiz</h2>

      <div class="form-field">
        <label for="title" class="form-label">Titel</label>
        <input
          id="title"
          type="text"
          class="form-input"
          placeholder="Titel der Notiz"
        />
      </div>

      <div class="form-field">
        <label for="content" class="form-label">Inhalt</label>
        <textarea
          id="content"
          class="form-textarea"
          placeholder="Notiz erfassen…"
        ></textarea>
      </div>

      <button class="btn btn--primary">Notiz speichern</button>
    </section>

<section>
  <h2>Meine Notizen</h2>

  <div class="notes-list">
    <article class="note-card">
      <header class="note-card__header">
        <h3 class="note-card__title">Einkaufsliste</h3>
      </header>

      <p class="note-card__content">
        Milch, Brot, Kaffee
        <a href="https://google.com" target="_blank">Google</a>
      </p>

      <footer class="note-card__footer">
        <button class="btn btn--secondary">Bearbeiten</button>
        <button class="btn btn--primary">Abschliessen</button>
      </footer>
    </article>

    <article class="note-card note-card--completed">
      <header class="note-card__header">
        <h3 class="note-card__title">Termin</h3>
      </header>

      <p class="note-card__content">
        Arzttermin um 14:00 Uhr
      </p>

      <footer class="note-card__footer">
        <button class="btn btn--secondary">Bearbeiten</button>
      </footer>
    </article>
  </div>
</section>
  </body>
</html>
