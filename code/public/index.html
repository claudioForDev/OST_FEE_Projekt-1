<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <title>What's next?</title>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/handlebars.js/4.7.3/handlebars.min.js"
      integrity="sha256-/PJBs6QWvXijOFIX04kZpLb6ZtSQckdOIavLWKKOgXU="
      crossorigin="anonymous"
      defer
    ></script>
    <script src="scripts/index.js" type="module"></script>

    <link rel="stylesheet" href="./styles/index.css" />
  </head>
  <body>
    <div class="container">
      <header class="app-header">
        <button id="new-note-button" class="btn btn--primary">
          Neue Notiz erstellen
        </button>

        <button id="theme-toggle" class="btn btn--secondary">Dark Mode</button>
      </header>

      <section id="note-form-section">
        <h2>Neue Notiz</h2>

        <form id="note-form">
          <div class="form-field">
            <label for="title" class="form-label">Titel</label>
            <input
              id="title"
              type="text"
              class="form-input"
              placeholder="Titel der Notiz"
              required
            />
          </div>

          <div class="form-field">
            <label for="content" class="form-label">Inhalt</label>
            <textarea
              id="content"
              class="form-textarea"
              placeholder="Notiz hier erfassen"
            ></textarea>
          </div>

          <div class="form-field">
            <label for="importance" class="form-label">Wichtigkeit</label>
            <select id="importance" class="form-input">
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3" selected>3</option>
              <option value="4">4</option>
              <option value="5">5</option>
            </select>
          </div>

          <div class="form-field">
            <label for="dueDate" class="form-label">Erledigungsdatum</label>
            <input id="dueDate" type="date" class="form-input" />
          </div>

          <button type="button" id="cancel-button" class="btn btn--secondary">
            Zurück
          </button>

          <button type="submit" class="btn btn--primary">
            Notiz speichern
          </button>
        </form>
      </section>

      <section id="notes-section">
        <div class="notes-controls">
          <div class="notes-controls__group">
            <p class="notes-controls__label">Filtern</p>

            <div class="notes-controls__buttons">
              <button class="btn btn--secondary" data-filter="all">Alle</button>
              <button class="btn btn--secondary" data-filter="open">
                Offen
              </button>
              <button class="btn btn--secondary" data-filter="completed">
                Abgeschlossen
              </button>
            </div>
          </div>

          <div class="notes-controls__group">
            <p class="notes-controls__label">Sortieren</p>

            <div class="notes-controls__buttons">
              <button class="btn btn--secondary" data-sort="title">Title</button>
              <button class="btn btn--secondary" data-sort="dueDate">
                Fälligkeitsdatum
              </button>
              <button class="btn btn--secondary" data-sort="createdAt">
                Erstellungsdatum
              </button>
              <button class="btn btn--secondary" data-sort="importance">
                Wichtigkeit
              </button>
            </div>
          </div>
        </div>

        <div class="notes-list">
          <!-- note-card Elemente -->
        </div>
      </section>
    </div>
  </body>
</html>
